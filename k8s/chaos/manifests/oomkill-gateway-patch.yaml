spec:
  template:
    spec:
      containers:
      - name: http-echo
        image: polinux/stress:latest
        command:
        - stress
        args:
        - --vm
        - "1"
        - --vm-bytes
        - 256M
        - --vm-hang
        - "1"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi
